# Cross-cutting concept registry for vision3d.
#
# vision3d is a FastAPI HTTP server (no MCP protocol, no stdio transport).
# Its invariants protect the public REST surface, the stable preset/model
# names consumed by maya-mcp, and the architectural guardrails carried
# over from Chat 31–34 (no FlashVDM, no PAINT_MAX_FACES, no attention_slicing).
#
# All invariants pass against HEAD (Chat 44 audit: "no critical drifts").
# Strict mode flipped on 2026-04-20 (Chat 46), after release-flow tension
# was resolved via changelog_tag_sync tolerance + cut-release.sh.

schema_version: 1
repo: vision3d
strict: true

concepts:

  rest_endpoint_inventory:
    description: >
      The eleven public REST endpoints exposed by server.py. Path strings
      are the contract that maya-mcp pins against; drift here silently
      breaks the downstream client. The expected set is hardcoded in this
      YAML intentionally — adding an endpoint forces a registry edit in
      the same commit.
    source_of_truth:
      file: server.py
      symbol: "@app.get / @app.post / @app.delete decorators"
    mirrors:
      - file: .concepts.yml
        field: "endpoint_inventory_subset.a_source.values"
      - file: CLAUDE.md
        section: "REST API"
        kind: prose_enumeration
      - file: README.md
        section: "HTTP API surface"
        kind: prose_enumeration
    invariants:
      - id: endpoint_inventory_subset
        type: subset
        direction: bidirectional
        a_source:
          type: ast_decorator_args
          file: server.py
          decorators: [app.get, app.post, app.delete]
          arg_index: 0
        b_source:
          type: literal_set
          values:
            - "/"
            - /api/health
            - /api/models
            - /api/presets
            - /api/generate-shape
            - /api/generate-text
            - /api/generate-full
            - /api/texture-mesh
            - /api/jobs/{job_id}
            - /api/jobs/{job_id}/files/{filename}
            - /api/jobs/{job_id}/stream

  quality_presets_stable:
    description: >
      QUALITY_PRESETS dict exposes exactly four preset names. Client code
      (maya-mcp, Web UI, README examples) hardcodes these; adding or
      removing one is a breaking change that must be explicit.
    source_of_truth:
      file: server.py
      symbol: QUALITY_PRESETS
    invariants:
      - id: preset_names_match_contract
        type: subset
        direction: bidirectional
        a_source:
          type: ast_dict_keys
          file: server.py
          symbol: QUALITY_PRESETS
        b_source:
          type: literal_set
          values: [low, medium, high, ultra]

  shape_models_stable:
    description: >
      SHAPE_MODELS dict names expose exactly three user-facing identifiers.
      Runtime availability depends on weights on disk (checked separately by
      _get_available_models), but the user-facing names are a stable contract.
    source_of_truth:
      file: server.py
      symbol: SHAPE_MODELS
    invariants:
      - id: shape_model_names_match_contract
        type: subset
        direction: bidirectional
        a_source:
          type: ast_dict_keys
          file: server.py
          symbol: SHAPE_MODELS
        b_source:
          type: literal_set
          values: [turbo, fast, full]

  api_key_timing_safe:
    description: >
      Authentication uses `secrets.compare_digest` (timing-safe) and NEVER
      plain `==`. The property was established at v1.0 and must not regress
      (would open a timing side-channel on the API key).
    source_of_truth:
      file: server.py
      symbol: _verify_api_key
    invariants:
      - id: compare_digest_present
        type: claim_verifies
        claim: "server.py uses secrets.compare_digest for API-key validation"
        code_grep:
          regex: 'secrets\.compare_digest'
          file_pattern: server.py
        expected: found

  retired_concepts_absent:
    description: >
      Chat 31–34 removed several failed experiments. Any re-appearance in
      code would be a regression. These patterns must stay absent.
    invariants:
      - id: flashvdm_absent
        type: claim_verifies
        claim: "FlashVDM removed in Chat 34 (degenerate topology; distrust memory)"
        code_grep:
          regex: 'FlashVDM|enable_flashvdm|flashvdm'
          file_pattern: server.py
        expected: not_found

      - id: attention_slicing_absent
        type: claim_verifies
        claim: "attention_slicing was dead code since Chat 31"
        code_grep:
          regex: 'attention_slicing|enable_attention_slicing'
          file_pattern: server.py
        expected: not_found

      - id: paint_max_faces_guard_absent
        type: claim_verifies
        claim: "PAINT_MAX_FACES guard reverted in Chat 32 (erroneous)"
        code_grep:
          regex: 'PAINT_MAX_FACES'
          file_pattern: server.py
        expected: not_found

  release_cadence:
    description: >
      Ecosystem-wide rule (Chat 44): work should be tagged as a release
      before the backlog grows unbounded past the last tag. Thresholds:
      10 commits soft warning, 30 commits hard stop; also flags tags
      older than 30 days with pending work.
    source_of_truth:
      file: git
      command: "git describe --tags --abbrev=0 && git rev-list --count <tag>..HEAD"
    invariants:
      - id: commits_since_last_tag_under_threshold
        type: commits_since_tag
        warn_commits: 10
        max_commits: 30
        max_age_days: 30

  changelog_tag_coherence:
    description: >
      Every `## [X.Y.Z]` section in CHANGELOG.md must correspond to a
      git tag `vX.Y.Z`, and every git tag must have a CHANGELOG section.
      Catches mid-release inconsistent states and forgotten tags. The
      release-in-progress transient drift (CHANGELOG moved but tag not
      yet created at pre-commit time) is tolerated iff the drifting
      version matches env `CUT_RELEASE_VERSION` (set by
      scripts/cut-release.sh) OR the content of the VERSION file.
    source_of_truth:
      file: CHANGELOG.md
      plus: "git tag --list 'v*'"
    invariants:
      - id: changelog_sections_match_tags
        type: changelog_tag_sync
        direction: bidirectional
        release_anchor:
          file: VERSION
          regex: '^(\d+\.\d+\.\d+)'

  single_install_script_at_root:
    description: >
      Ecosystem rule (Chat 34): each MCP-ecosystem repo has exactly one
      install script at the repo root. vision3d is the repo where the rule
      was first established; this invariant prevents regression.
    invariants:
      - id: one_install_script_at_root
        type: glob_count
        patterns:
          - "install*.sh"
          - "setup*.sh"
        expected: 1

  paint_pipeline_unload:
    description: >
      The paint pipeline (~14 GB VRAM) MUST have both an _unload_paint_pipeline()
      function and an idle-timer that calls it after PAINT_IDLE_SECONDS of
      inactivity. Without these, paint stays cached forever and holds VRAM
      even when the server is idle — blocking sibling GPU services (Ollama,
      ComfyUI) on the shared GPU. Regression prevention for the 7+ day VRAM
      leak observed on glorfindel 2026-04.
    source_of_truth:
      file: server.py
      symbol: "_unload_paint_pipeline + _paint_idle_loop"
    invariants:
      - id: unload_paint_pipeline_exists
        type: claim_verifies
        claim: "server.py defines _unload_paint_pipeline()"
        code_grep:
          regex: 'def _unload_paint_pipeline\('
          file_pattern: 'server.py'
        expected: found
      - id: paint_idle_loop_exists
        type: claim_verifies
        claim: "server.py defines _paint_idle_loop() background task"
        code_grep:
          regex: 'async def _paint_idle_loop\('
          file_pattern: 'server.py'
        expected: found
      - id: paint_idle_loop_registered_in_lifespan
        type: claim_verifies
        claim: "lifespan schedules _paint_idle_loop via asyncio.create_task"
        code_grep:
          regex: 'asyncio\.create_task\(_paint_idle_loop\(\)\)'
          file_pattern: 'server.py'
        expected: found

  github_release_per_tag:
    description: >
      Every git tag vX.Y.Z (v1.0.0+) must have a corresponding published GitHub
      Release. Catches tags pushed without `gh release create`. Pre-1.0 tags
      are excluded (v0.x was pre-release noise). Requires `gh` CLI authenticated;
      drift reports will be false-positive if gh is offline or unauthenticated.
    source_of_truth:
      file: git
      command: "git tag --list 'v*'"
    mirrors:
      - command: "gh release list"
    invariants:
      - id: every_v1plus_tag_has_github_release
        type: subset
        ci_skip: true  # b_source shells out to `gh release list` — default GH_TOKEN scope varies
        direction: a_subset_b
        a_source:
          type: command_lines
          cmd: "git tag --list 'v*' | grep -Ev '^v0\\.' | sed 's/^v//'"
        b_source:
          type: command_lines
          cmd: "gh release list --limit 200 --json tagName --jq '.[].tagName' | sed 's/^v//'"
