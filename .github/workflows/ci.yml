name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # glorfindel (deploy target) runs Python 3.9, so the lower bound is
        # 3.9 — NOT 3.10 like the other ecosystem repos. Chat 45 lesson:
        # `float | None` (PEP 604) crashed on the real host because Mac-side
        # pytest was only on 3.10+.
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install minimal test deps
        run: |
          # Heavy runtime deps (torch, diffusers, trimesh, hy3dgen, rembg,
          # pyfqmr, pillow, psutil) are mocked in tests/conftest.py via
          # MagicMock. Only install the web-server stack + pytest.
          python -m pip install --upgrade pip
          pip install fastapi "uvicorn[standard]" python-multipart \
                      sse-starlette httpx
          pip install pytest pytest-asyncio pytest-cov pyyaml

      - name: Run tests (with coverage)
        run: |
          python -m pytest tests/ -p no:warnings --cov=server --cov-report=term

  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    continue-on-error: false  # Chat 47: baseline cleaned, lint is now blocking
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check server.py tests/ --output-format=github

  typecheck:
    name: mypy
    runs-on: ubuntu-latest
    continue-on-error: false  # Chat 47: baseline cleared, mypy is now blocking
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install minimal deps + mypy
        run: |
          python -m pip install --upgrade pip
          pip install fastapi "uvicorn[standard]" python-multipart \
                      sse-starlette httpx pyyaml
          pip install mypy

      - name: Run mypy
        run: mypy server.py --ignore-missing-imports --no-strict-optional

  concepts:
    name: verify_concepts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install pyyaml + gh (for github_release_per_tag invariant)
        run: |
          pip install pyyaml
          sudo apt-get update && sudo apt-get install -y gh

      - name: Run verify_concepts.py
        env:
          GH_TOKEN: ${{ github.token }}
        run: python scripts/verify_concepts.py
